                            </div>

                            {/* 新增紀錄表單 */}
                            <div className="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
                                <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2 mb-4">
                                    <Plus className="w-5 h-5 text-indigo-500" /> 新增歷史結算紀錄
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">結單日期</label>
                                        <input type="date" value={newDate} onChange={(e) => setNewDate(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">股票代號/名稱 <span className="text-red-400">*</span></label>
                                        <input type="text" value={newStock} onChange={(e) => setNewStock(e.target.value)} placeholder="例如：2330 台積電" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">已實現淨利 (元) <span className="text-red-400">*</span></label>
                                        <input type="number" value={newProfit} onChange={(e) => setNewProfit(e.target.value)} placeholder="賺錢為正，賠錢加負號 (-)" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">檢討與備註</label>
                                        <input type="text" value={newNote} onChange={(e) => setNewNote(e.target.value)} placeholder="例：遵守紀律停利" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none" />
                                    </div>
                                </div>
                                <button onClick={handleAddRecord} disabled={syncStatus === 'syncing'} className={`w-full sm:w-auto font-bold py-2.5 px-6 rounded-lg transition-colors shadow-sm ${syncStatus === 'syncing' ? 'bg-indigo-300 text-white cursor-not-allowed' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`}>
                                    {syncStatus === 'syncing' ? '同步中...' : '➕ 加入總帳本'}
                                </button>
                            </div>
                        </div>

                        {/* 歷史紀錄列表 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                                <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                    <BookOpen className="w-5 h-5 text-slate-500" /> 歷史交易明細
                                </h2>
                            </div>
                            <div className="overflow-x-auto hide-scrollbar">
                                {records.length === 0 ? (
                                    <div className="text-center py-12 text-slate-400">目前還沒有任何歷史紀錄，在上方新增您的第一筆戰績吧！</div>
                                ) : (
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead>
                                            <tr className="bg-white text-slate-500 border-b border-slate-100">
                                                <th className="py-4 px-6 font-semibold">日期</th>
                                                <th className="py-4 px-6 font-semibold">股票名稱</th>
                                                <th className="py-4 px-6 font-semibold text-right">已實現淨損益</th>
                                                <th className="py-4 px-6 font-semibold">備註</th>
                                                <th className="py-4 px-6 font-semibold text-center">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-slate-700">
                                            {records.map(record => (
                                                <tr key={record.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                    <td className="py-3 px-6 text-slate-500">{record.date}</td>
                                                    <td className="py-3 px-6 font-bold">{record.stock}</td>
                                                    <td className={`py-3 px-6 text-right font-black ${record.profit >= 0 ? 'text-red-500' : 'text-green-500'}`}>
                                                        {record.profit >= 0 ? '+' : ''}{record.profit.toLocaleString()}
                                                    </td>
                                                    <td className="py-3 px-6 text-slate-500 max-w-xs truncate" title={record.note}>{record.note || '-'}</td>
                                                    <td className="py-3 px-6 text-center">
                                                        <button onClick={() => handleDeleteRecord(record.id)} className="text-slate-300 hover:text-red-500 transition-colors p-1" title="刪除"><Trash2 className="w-4 h-4 mx-auto" /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // ==========================================
        // 核心子元件：負責每個「分頁」內的獨立試算
        // ==========================================
        function Calculator({ tabId, tabName, onRename }) {
            // 利用 tabId 來命名 LocalStorage 的 key，確保每個分頁資料獨立
            const getStorageKey = (key) => `twStockCalc_${tabId}_${key}`;

            const [buyOrders, setBuyOrders] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('buyOrders'));
                return saved ? JSON.parse(saved) : [{ id: 1, price: '', shares: '' }];
            });

            const [sellOrders, setSellOrders] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('sellOrders'));
                return saved ? JSON.parse(saved) : [{ id: 1, price: '', shares: '' }];
            });

            const [feeDiscount, setFeeDiscount] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('feeDiscount')); return saved ? Number(saved) : 20;
            });
            const [minFee, setMinFee] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('minFee')); return saved ? Number(saved) : 1;
            });
            const [brokerPreset, setBrokerPreset] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('brokerPreset')); return saved ? saved : 'dawho';
            });
            const [savedPlans, setSavedPlans] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('savedPlans')); return saved ? JSON.parse(saved) : [];
            });
            const [budgetAmount, setBudgetAmount] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('budgetAmount')); return saved ? Number(saved) : '';
            });
            const [budgetPrice, setBudgetPrice] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('budgetPrice')); return saved ? Number(saved) : '';
            });

            const [reinvestSource, setReinvestSource] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('reinvestSource')); return saved ? saved : 'revenue';
            });
            const [customReinvestAmount, setCustomReinvestAmount] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('customReinvestAmount')); return saved ? Number(saved) : '';
            });
            const [customReinvestShares, setCustomReinvestShares] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('customReinvestShares')); return saved ? Number(saved) : '';
            });
            const [reinvestBuyPrice, setReinvestBuyPrice] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('reinvestBuyPrice')); return saved ? Number(saved) : '';
            });
            const [reinvestTargetPrice, setReinvestTargetPrice] = useState(() => {
                const saved = localStorage.getItem(getStorageKey('reinvestTargetPrice')); return saved ? Number(saved) : '';
            });

            useEffect(() => {
                localStorage.setItem(getStorageKey('buyOrders'), JSON.stringify(buyOrders));
                localStorage.setItem(getStorageKey('sellOrders'), JSON.stringify(sellOrders));
                localStorage.setItem(getStorageKey('feeDiscount'), feeDiscount);
                localStorage.setItem(getStorageKey('minFee'), minFee);
                localStorage.setItem(getStorageKey('brokerPreset'), brokerPreset);
                localStorage.setItem(getStorageKey('savedPlans'), JSON.stringify(savedPlans));
                localStorage.setItem(getStorageKey('budgetAmount'), budgetAmount);
                localStorage.setItem(getStorageKey('budgetPrice'), budgetPrice);
                localStorage.setItem(getStorageKey('reinvestSource'), reinvestSource);
                localStorage.setItem(getStorageKey('customReinvestAmount'), customReinvestAmount);
                localStorage.setItem(getStorageKey('customReinvestShares'), customReinvestShares);
                localStorage.setItem(getStorageKey('reinvestBuyPrice'), reinvestBuyPrice);
                localStorage.setItem(getStorageKey('reinvestTargetPrice'), reinvestTargetPrice);
            }, [buyOrders, sellOrders, feeDiscount, minFee, brokerPreset, savedPlans, budgetAmount, budgetPrice, reinvestSource, customReinvestAmount, customReinvestShares, reinvestBuyPrice, reinvestTargetPrice, tabId]);

            const FEE_RATE = 0.001425;
            const TAX_RATE = 0.003;

            const handlePresetChange = (e) => {
                const preset = e.target.value;
                setBrokerPreset(preset);
                if (preset === 'dawho') { setFeeDiscount(20); setMinFee(1); } 
                else if (preset === 'cathay') { setFeeDiscount(28); setMinFee(1); } 
                else if (preset === 'standard') { setFeeDiscount(100); setMinFee(20); }
            };

            const calculateBuy = (order) => {
                const gross = (order.price || 0) * (order.shares || 0);
                if (gross === 0) return { gross: 0, fee: 0, cost: 0 };
                const originalFee = Math.floor(gross * FEE_RATE); 
                let finalFee = Math.floor(originalFee * (feeDiscount / 100));
                finalFee = Math.max(finalFee, minFee); 
                const cost = gross + finalFee;
                return { gross, fee: finalFee, cost };
            };

            const calculateSell = (order) => {
                const gross = (order.price || 0) * (order.shares || 0);
                if (gross === 0) return { gross: 0, fee: 0, tax: 0, revenue: 0 };
                const originalFee = Math.floor(gross * FEE_RATE);
                let finalFee = Math.floor(originalFee * (feeDiscount / 100));
                finalFee = Math.max(finalFee, minFee); 
                const tax = Math.floor(gross * TAX_RATE);
                const revenue = gross - finalFee - tax;
                return { gross, fee: finalFee, tax, revenue };
            };

            const updateOrder = (type, id, field, value) => {
                const numValue = value === '' ? '' : Number(value);
                if (type === 'buy') setBuyOrders(buyOrders.map(o => o.id === id ? { ...o, [field]: numValue } : o));
                else setSellOrders(sellOrders.map(o => o.id === id ? { ...o, [field]: numValue } : o));
            };

            const addOrder = (type) => {
                const newId = Date.now();
                if (type === 'buy') setBuyOrders([...buyOrders, { id: newId, price: '', shares: '' }]);
                else setSellOrders([...sellOrders, { id: newId, price: '', shares: '' }]);
            };

            const removeOrder = (type, id) => {
                if (type === 'buy') setBuyOrders(buyOrders.filter(o => o.id !== id));
                else setSellOrders(sellOrders.filter(o => o.id !== id));
            };

            const totalBuy = buyOrders.reduce((acc, order) => {
                const calc = calculateBuy(order);
                return { gross: acc.gross + calc.gross, fee: acc.fee + calc.fee, cost: acc.cost + calc.cost, shares: acc.shares + (Number(order.shares) || 0) };
            }, { gross: 0, fee: 0, cost: 0, shares: 0 });

            const totalSell = sellOrders.reduce((acc, order) => {
                const calc = calculateSell(order);
                return { gross: acc.gross + calc.gross, fee: acc.fee + calc.fee, tax: acc.tax + calc.tax, revenue: acc.revenue + calc.revenue, shares: acc.shares + (Number(order.shares) || 0) };
            }, { gross: 0, fee: 0, tax: 0, revenue: 0, shares: 0 });

            // ================== 先進先出 (FIFO) 邏輯計算 ==================
            let realizedCost = 0;
            let remainingSellShares = totalSell.shares;
            let unsoldBuyCost = 0;
            let unsoldShares = 0;
            let unsoldBuyFee = 0;

            for (const order of buyOrders) {
                const calc = calculateBuy(order);
                const shares = Number(order.shares) || 0;
                if (shares === 0) continue;

                if (remainingSellShares >= shares) {
                    realizedCost += calc.cost;
                    remainingSellShares -= shares;
                } else if (remainingSellShares > 0) {
                    const ratio = remainingSellShares / shares;
                    realizedCost += calc.cost * ratio;
                    
                    const remainingRatio = 1 - ratio;
                    unsoldBuyCost += calc.cost * remainingRatio;
                    unsoldShares += shares * remainingRatio;
                    unsoldBuyFee += calc.fee * remainingRatio;
                    
                    remainingSellShares = 0;
                } else {
                    unsoldBuyCost += calc.cost;
                    unsoldShares += shares;
                    unsoldBuyFee += calc.fee;
                }
            }

            if (remainingSellShares > 0) {
                const avgCost = totalBuy.shares > 0 ? totalBuy.cost / totalBuy.shares : 0;
                realizedCost += remainingSellShares * avgCost;
            }

            const netProfit = totalSell.revenue - realizedCost;
            const roi = realizedCost > 0 ? ((netProfit / realizedCost) * 100).toFixed(2) : 0;
            
            const isProfit = netProfit >= 0;
            const profitColor = isProfit ? 'text-red-500' : 'text-green-500';
            const profitBgColor = isProfit ? 'bg-red-50' : 'bg-green-50';
            const profitBorderColor = isProfit ? 'border-red-200' : 'border-green-200';

            const clearAllData = () => {
                if(confirm('確定要清空此分頁的所有紀錄嗎？(不會刪除您的計畫庫)')) {
                    setBuyOrders([{ id: Date.now(), price: '', shares: '' }]);
                    setSellOrders([{ id: Date.now() + 1, price: '', shares: '' }]);
                    setBudgetAmount(''); setBudgetPrice('');
                    setReinvestBuyPrice(''); setReinvestTargetPrice('');
                    setCustomReinvestAmount(''); setCustomReinvestShares('');
                }
            };

            const maxChartValue = Math.max(totalBuy.cost, totalSell.revenue, 1);
            const costBarWidth = `${(totalBuy.cost / maxChartValue) * 100}%`;
            const revenueBarWidth = `${(totalSell.revenue / maxChartValue) * 100}%`;
            const sellProgress = totalBuy.shares > 0 ? Math.min((totalSell.shares / totalBuy.shares) * 100, 100) : 0;

            const getTickSize = (price) => {
                if (price < 10) return 0.01; if (price < 50) return 0.05; if (price < 100) return 0.1;
                if (price < 500) return 0.5; if (price < 1000) return 1; return 5;
            };

            const generateProjectionTable = () => {
                if (unsoldShares <= 0 || unsoldBuyCost <= 0) return [];
                const avgPrice = unsoldBuyCost / unsoldShares;
                let rows = [];
                const targets = [0.05, 0.055, 0.06, 0.065, 0.07, 0.075, 0.08];
                targets.forEach(target => {
                    let exactPrice = avgPrice * (1 + target);
                    let tick = getTickSize(exactPrice);
                    let currentPrice = Math.round(exactPrice / tick) * tick;
                    currentPrice = Math.round(currentPrice * 100) / 100;
                    
                    const gross = currentPrice * unsoldShares;
                    const originalFee = Math.floor(gross * FEE_RATE);
                    let finalFee = Math.floor(originalFee * (feeDiscount / 100));
                    finalFee = Math.max(finalFee, minFee);
                    const tax = Math.floor(gross * TAX_RATE);
                    
                    const revenue = gross - finalFee - tax;
                    const profit = revenue - unsoldBuyCost;
                    const projRoi = (profit / unsoldBuyCost) * 100;
                    
                    rows.push({
                        targetRaw: target, targetLabel: `+${(target * 100).toFixed(1)}%`, sellPrice: currentPrice.toFixed(2),
                        profit: profit, roi: projRoi.toFixed(2), buyFee: Math.round(unsoldBuyFee), sellFee: finalFee, tax: tax,
                        costIncludingAll: unsoldBuyCost + finalFee + tax 
                    });
                });
                return rows;
            };

            const saveCurrentPlan = () => {
                let text = `🟢 【${tabName}】買進規劃：\n`;
                buyOrders.forEach(o => { if (o.price && o.shares) text += ` - ${o.price}元 × ${o.shares}股\n`; });
                text += ` ➔ 總支出：${totalBuy.cost.toLocaleString()} 元\n\n`;
                text += "🔴 賣出規劃：\n";
                sellOrders.forEach(o => { if (o.price && o.shares) text += ` - ${o.price}元 × ${o.shares}股\n`; });
                text += ` ➔ 總實收：${totalSell.revenue.toLocaleString()} 元\n\n`;
                text += "💰 第一階段已實現結果 (FIFO)：\n";
                text += ` ➔ 淨損益：${isProfit ? '+' : ''}${Math.round(netProfit).toLocaleString()} 元\n`;
                text += ` ➔ 報酬率：${isProfit ? '+' : ''}${roi}%\n`;
                const newPlan = { id: Date.now(), date: new Date().toLocaleString('zh-TW', { hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }), content: text };
                setSavedPlans([newPlan, ...savedPlans]);
            };

            const updateSavedPlan = (id, newContent) => setSavedPlans(savedPlans.map(p => p.id === id ? { ...p, content: newContent } : p));
            const deleteSavedPlan = (id) => setSavedPlans(savedPlans.filter(p => p.id !== id));

            // ================== 預算換算工具邏輯 ==================
            let maxSharesBudget = 0; let budgetCost = 0; let budgetFee = 0;
            if (budgetAmount > 0 && budgetPrice > 0) {
                maxSharesBudget = Math.floor(budgetAmount / budgetPrice);
                while (maxSharesBudget > 0) {
                    const calc = calculateBuy({ price: budgetPrice, shares: maxSharesBudget });
                    if (calc.cost <= budgetAmount) {
                        budgetCost = calc.cost; budgetFee = calc.fee; break;
                    }
                    maxSharesBudget--;
                }
            }
            const remainingBudget = (budgetAmount > 0 && maxSharesBudget > 0) ? budgetAmount - budgetCost : budgetAmount;
            const handleAddFromBudget = () => {
                if (maxSharesBudget > 0) setBuyOrders([...buyOrders, { id: Date.now(), price: budgetPrice, shares: maxSharesBudget }]);
            };

            // ================== 獲利再投入 / 加碼邏輯 ==================
            let reinvestAvailableFunds = 0;
            let rMaxShares = 0; let rCost = 0; let rBuyFee = 0;
            const rBuyPriceNum = Number(reinvestBuyPrice);

            if (reinvestSource === 'custom_shares') {
                rMaxShares = Number(customReinvestShares);
                if (rMaxShares > 0 && rBuyPriceNum > 0) {
                    const calc = calculateBuy({ price: rBuyPriceNum, shares: rMaxShares });
                    rCost = calc.cost; 
                    rBuyFee = calc.fee;
                    reinvestAvailableFunds = rCost; 
                }
            } else {
                if (reinvestSource === 'revenue') {
                    reinvestAvailableFunds = totalSell.revenue;
                } else if (reinvestSource === 'profit') {
                    reinvestAvailableFunds = Math.max(0, netProfit);
                } else if (reinvestSource === 'custom') {
                    reinvestAvailableFunds = Number(customReinvestAmount);
                }

                if (reinvestAvailableFunds > 0 && rBuyPriceNum > 0) {
                    rMaxShares = Math.floor(reinvestAvailableFunds / rBuyPriceNum);
                    while (rMaxShares > 0) {
                        const calc = calculateBuy({ price: rBuyPriceNum, shares: rMaxShares });
                        if (calc.cost <= reinvestAvailableFunds) {
                            rCost = calc.cost; rBuyFee = calc.fee; break;
                        }
                        rMaxShares--;
                    }
                }
            }
            const rRemainingCash = reinvestAvailableFunds > 0 && rMaxShares > 0 ? reinvestAvailableFunds - rCost : reinvestAvailableFunds;

            // --- 結算新均價與全平倉 ---
            const newTotalShares = unsoldShares + rMaxShares;
            
            const totalNetCost = unsoldBuyCost + rCost;
            let newAvgPrice = 0;
            if (newTotalShares > 0) {
                newAvgPrice = totalNetCost > 0 ? (totalNetCost / newTotalShares).toFixed(2) : 0;
            }

            const rTargetPriceNum = Number(reinvestTargetPrice);
            let finalSellRevenue = 0;
            let finalNetProfit = 0;
            let finalRoi = 0;
            if (newTotalShares > 0 && rTargetPriceNum > 0) {
                const calc = calculateSell({ price: rTargetPriceNum, shares: newTotalShares });
                finalSellRevenue = calc.revenue;
                
                const phase2Profit = finalSellRevenue - totalNetCost;
                finalNetProfit = netProfit + phase2Profit;
                
                const maxInvested = totalBuy.cost + rCost;
                finalRoi = maxInvested > 0 ? ((finalNetProfit / maxInvested) * 100).toFixed(2) : 0;
            }

            return (
                <div className="p-4 md:p-8">
                <div className="max-w-5xl mx-auto space-y-6">
                    
                    {/* Header */}
                    <div className="flex flex-col xl:flex-row xl:items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
                    <div className="flex items-center gap-3">
                        <div className="p-3 bg-blue-100 text-blue-600 rounded-xl">
                        <CalculatorIcon className="w-6 h-6" />
                        </div>
                        <div>
                        <div className="flex items-center gap-2">
                            <h1 className="text-2xl font-bold text-slate-800">{tabName}</h1>
                            <button onClick={onRename} className="text-slate-400 hover:text-blue-500 transition-colors p-1" title="重新命名分頁"><Edit3 className="w-4 h-4" /></button>
                        </div>
                        <p className="text-slate-500 text-sm mt-1">精準計算手續費、證交稅與先進先出損益</p>
                        </div>
                    </div>
                    
                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 text-sm text-slate-600 bg-slate-50 p-3.5 rounded-xl border border-slate-200 w-full xl:w-auto">
                        <div className="flex items-center gap-2 mb-2 sm:mb-0">
                        <Settings className="w-4 h-4 text-slate-400" />
                        <span className="font-semibold whitespace-nowrap">手續費設定</span>
                        </div>
                        <div className="flex flex-wrap items-center gap-3">
                        <select 
                            value={brokerPreset} 
                            onChange={handlePresetChange}
                            className="p-1.5 border border-slate-300 rounded-lg bg-white text-slate-700 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all"
                        >
                            <option value="dawho">永豐大戶投 (2折/低消1元)</option>
                            <option value="cathay">國泰證券 (2.8折/低消1元)</option>
                            <option value="standard">一般券商 (無折扣/低消20元)</option>
                            <option value="custom">自訂費率</option>
                        </select>
                        
                        <div className="flex items-center gap-1">
                            <span>折扣:</span>
                            <input type="number" value={feeDiscount} onChange={(e) => { setFeeDiscount(Number(e.target.value)); setBrokerPreset('custom'); }} className="w-14 p-1 text-center border border-slate-300 rounded bg-white focus:border-blue-400 outline-none" />
                            <span>%</span>
                        </div>
                        
                        <div className="flex items-center gap-1">
                            <span>低消:</span>
                            <input type="number" value={minFee} onChange={(e) => { setMinFee(Number(e.target.value)); setBrokerPreset('custom'); }} className="w-14 p-1 text-center border border-slate-300 rounded bg-white focus:border-blue-400 outline-none" />
                            <span>元</span>
                        </div>
                        <button onClick={clearAllData} className="ml-auto text-slate-400 hover:text-red-500 transition-colors p-1" title="清空所有資料"><Trash2 className="w-4 h-4" /></button>
                        </div>
                    </div>
                    </div>

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                        {/* Left Column: Inputs */}
                        <div className="md:col-span-2 space-y-6 order-2 md:order-1">
                            
                            {/* 預算換算工具 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="bg-emerald-50/50 p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                        <Wallet className="w-5 h-5 text-emerald-500" /> 預算建倉工具
                                    </h2>
                                </div>
                                <div className="p-4">
                                    <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center">
                                        <div className="flex-1 w-full">
                                            <label className="block text-xs text-slate-400 mb-1">預算總金額 (元)</label>
                                            <input type="number" value={budgetAmount} onChange={(e) => setBudgetAmount(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-100 focus:border-emerald-400 outline-none transition-all" placeholder="例如：100000" />
                                        </div>
                                        <div className="flex-1 w-full">
                                            <label className="block text-xs text-slate-400 mb-1">預估買價 (元)</label>
                                            <input type="number" step="0.1" value={budgetPrice} onChange={(e) => setBudgetPrice(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-100 focus:border-emerald-400 outline-none transition-all" placeholder="例如：150" />
                                        </div>
                                    </div>
                                    
                                    {budgetAmount > 0 && budgetPrice > 0 && (
                                        <div className="mt-4 p-4 bg-emerald-50/50 rounded-xl border border-emerald-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                                            <div className="flex flex-col w-full sm:w-auto text-center sm:text-left">
                                                <div className="text-emerald-800 mb-1">
                                                    最多可買 <span className="text-2xl font-black text-emerald-600">{maxSharesBudget.toLocaleString()}</span> 股
                                                </div>
                                                <div className="text-xs text-emerald-600">
                                                    總成本: {budgetCost.toLocaleString()} 元 (含費 {budgetFee} 元) | 剩: {remainingBudget.toLocaleString()} 元
                                                </div>
                                            </div>
                                            <button onClick={handleAddFromBudget} disabled={maxSharesBudget === 0} className={`w-full sm:w-auto px-4 py-2 rounded-lg font-bold transition-colors ${maxSharesBudget > 0 ? 'bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                加入買進紀錄
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Buy Section */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="bg-blue-50/50 p-4 border-b border-slate-100 flex justify-between items-center">
                                <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full bg-blue-500"></span> 買進紀錄
                                </h2>
                                <button onClick={() => addOrder('buy')} className="text-sm flex items-center gap-1 text-blue-600 hover:text-blue-700 bg-blue-100/50 px-3 py-1.5 rounded-lg transition-colors">
                                <Plus className="w-4 h-4" /> 新增買進
                                </button>
                            </div>
                            
                            <div className="p-4 space-y-3">
                                {buyOrders.map((order) => {
                                const calc = calculateBuy(order);
                                return (
                                    <div key={order.id} className="flex flex-col md:flex-row gap-3 items-center p-3 hover:bg-slate-50 rounded-xl border border-transparent hover:border-slate-100 transition-colors">
                                    <div className="flex gap-3 w-full md:w-auto flex-1">
                                        <div className="flex-1">
                                        <label className="block text-xs text-slate-400 mb-1">價格 (元)</label>
                                        <input type="number" step="0.1" value={order.price} onChange={(e) => updateOrder('buy', order.id, 'price', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all" placeholder="成交價" />
                                        </div>
                                        <div className="flex-1">
                                        <label className="block text-xs text-slate-400 mb-1">股數</label>
                                        <input type="number" step="1" value={order.shares} onChange={(e) => updateOrder('buy', order.id, 'shares', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all" placeholder="股" />
                                        </div>
                                    </div>
                                    <div className="flex w-full md:w-auto items-center justify-between md:justify-end gap-4 pl-2">
                                        <div className="text-right text-sm">
                                        <div className="text-slate-500">總支出: <span className="font-semibold text-slate-700">{calc.cost.toLocaleString()}</span></div>
                                        <div className="text-xs text-slate-400">含費: {calc.fee.toLocaleString()}</div>
                                        </div>
                                        <button onClick={() => removeOrder('buy', order.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="刪除"><Trash2 className="w-5 h-5" /></button>
                                    </div>
                                    </div>
                                );
                                })}
                                {buyOrders.length === 0 && <div className="text-center py-6 text-slate-400 text-sm">尚未新增買進紀錄</div>}

                                {totalBuy.shares > 0 && (
                                <div className="mt-4 p-4 bg-blue-50/50 rounded-xl border border-blue-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="text-sm text-blue-800 font-medium">🛒 累計買進 <span className="text-lg font-bold">{totalBuy.shares.toLocaleString()}</span> 股</div>
                                    <div className="flex flex-wrap gap-4 sm:justify-end w-full sm:w-auto">
                                        <div className="text-right">
                                            <div className="text-xs text-blue-600 mb-1">整體買進均價</div>
                                            <div className="text-2xl font-black text-blue-700">{(totalBuy.cost / totalBuy.shares).toFixed(2)} <span className="text-sm font-medium text-blue-600">元/股</span></div>
                                        </div>
                                        {unsoldShares > 0 && unsoldShares !== totalBuy.shares && (
                                            <div className="text-right border-l border-blue-200 pl-4">
                                                <div className="text-xs text-orange-600 mb-1">FIFO 留倉均價</div>
                                                <div className="text-2xl font-black text-orange-600">{(unsoldBuyCost / unsoldShares).toFixed(2)} <span className="text-sm font-medium text-orange-500">元/股</span></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                )}
                            </div>
                            </div>

                            {/* Sell Section */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="bg-orange-50/50 p-4 border-b border-slate-100 flex justify-between items-center">
                                <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full bg-orange-400"></span> 賣出計畫
                                </h2>
                                <button onClick={() => addOrder('sell')} className="text-sm flex items-center gap-1 text-orange-600 hover:text-orange-700 bg-orange-100/50 px-3 py-1.5 rounded-lg transition-colors">
                                <Plus className="w-4 h-4" /> 新增賣出
                                </button>
                            </div>
                            
                            <div className="p-4 space-y-3">
                                {sellOrders.map((order) => {
                                const calc = calculateSell(order);
                                return (
                                    <div key={order.id} className="flex flex-col md:flex-row gap-3 items-center p-3 hover:bg-slate-50 rounded-xl border border-transparent hover:border-slate-100 transition-colors">
                                    <div className="flex gap-3 w-full md:w-auto flex-1">
                                        <div className="flex-1">
                                        <label className="block text-xs text-slate-400 mb-1">價格 (元)</label>
                                        <input type="number" step="0.1" value={order.price} onChange={(e) => updateOrder('sell', order.id, 'price', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-100 focus:border-orange-400 outline-none transition-all" placeholder="成交價" />
                                        </div>
                                        <div className="flex-1">
                                        <label className="block text-xs text-slate-400 mb-1">股數</label>
                                        <input type="number" step="1" value={order.shares} onChange={(e) => updateOrder('sell', order.id, 'shares', e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-100 focus:border-orange-400 outline-none transition-all" placeholder="股" />
                                        </div>
                                    </div>
                                    <div className="flex w-full md:w-auto items-center justify-between md:justify-end gap-4 pl-2">
                                        <div className="text-right text-sm">
                                        <div className="text-slate-500">實收: <span className="font-semibold text-slate-700">{calc.revenue.toLocaleString()}</span></div>
                                        <div className="text-xs text-slate-400">費: {calc.fee} / 稅: {calc.tax}</div>
                                        </div>
                                        <button onClick={() => removeOrder('sell', order.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="刪除"><Trash2 className="w-5 h-5" /></button>
                                    </div>
                                    </div>
                                );
                                })}
                                {sellOrders.length === 0 && <div className="text-center py-6 text-slate-400 text-sm">尚未新增賣出計畫</div>}

                                {totalSell.shares > 0 && (
                                <div className="mt-4 p-4 bg-orange-50/50 rounded-xl border border-orange-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="text-sm text-orange-800 font-medium">💰 預計賣出 <span className="text-lg font-bold">{totalSell.shares.toLocaleString()}</span> 股</div>
                                    <div className="text-right w-full sm:w-auto">
                                    <div className="text-xs text-orange-600 mb-1">賣出均價 (扣除稅費後實收)</div>
                                    <div className="text-2xl font-black text-orange-700">{(totalSell.revenue / totalSell.shares).toFixed(2)} <span className="text-sm font-medium text-orange-600">元/股</span></div>
                                    </div>
                                </div>
                                )}
                            </div>
                            </div>

                            {/* 加碼與獲利轉滾 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="bg-indigo-50/80 p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                        <Repeat className="w-5 h-5 text-indigo-500" />
                                        🔄 賣出再加碼 / 獲利滾雪球
                                    </h2>
                                </div>
                                <div className="p-4 space-y-4">
                                    
                                    {/* 資金來源選擇 */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100">
                                        <label className={`flex flex-col items-center justify-center gap-1 py-2 px-1 rounded-lg cursor-pointer transition-colors border ${reinvestSource === 'revenue' ? 'bg-indigo-100 border-indigo-300 text-indigo-800 font-bold' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                                            <input type="radio" name="reinvest" value="revenue" checked={reinvestSource === 'revenue'} onChange={() => setReinvestSource('revenue')} className="hidden" />
                                            <span className="text-sm">🔥 賣出全壓</span>
                                            <span className="text-xs text-center">({totalSell.revenue.toLocaleString()}元)</span>
                                        </label>
                                        <label className={`flex flex-col items-center justify-center gap-1 py-2 px-1 rounded-lg cursor-pointer transition-colors border ${reinvestSource === 'profit' ? 'bg-indigo-100 border-indigo-300 text-indigo-800 font-bold' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                                            <input type="radio" name="reinvest" value="profit" checked={reinvestSource === 'profit'} onChange={() => setReinvestSource('profit')} className="hidden" />
                                            <span className="text-sm">🛡️ 僅用獲利</span>
                                            <span className="text-xs text-center">({Math.max(0, netProfit).toLocaleString()}元)</span>
                                        </label>
                                        <label className={`flex flex-col items-center justify-center gap-1 py-2 px-1 rounded-lg cursor-pointer transition-colors border ${reinvestSource === 'custom' ? 'bg-indigo-100 border-indigo-300 text-indigo-800 font-bold' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                                            <input type="radio" name="reinvest" value="custom" checked={reinvestSource === 'custom'} onChange={() => setReinvestSource('custom')} className="hidden" />
                                            <span className="text-sm">💰 自訂加碼金</span>
                                            <span className="text-xs text-center">(預算推算)</span>
                                        </label>
                                        <label className={`flex flex-col items-center justify-center gap-1 py-2 px-1 rounded-lg cursor-pointer transition-colors border ${reinvestSource === 'custom_shares' ? 'bg-indigo-100 border-indigo-300 text-indigo-800 font-bold' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-100'}`}>
                                            <input type="radio" name="reinvest" value="custom_shares" checked={reinvestSource === 'custom_shares'} onChange={() => setReinvestSource('custom_shares')} className="hidden" />
                                            <span className="text-sm">📊 自訂股數</span>
                                            <span className="text-xs text-center">(直接定股)</span>
                                        </label>
                                    </div>

                                    {/* 自訂輸入框 */}
                                    {reinvestSource === 'custom' && (
                                        <div className="bg-white p-3 rounded-xl border border-indigo-100">
                                            <label className="block text-xs text-indigo-500 mb-1 font-bold">請輸入您想加碼的總資金 (元)</label>
                                            <input type="number" value={customReinvestAmount} onChange={(e) => setCustomReinvestAmount(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all" placeholder="例如：200000" />
                                        </div>
                                    )}
                                    {reinvestSource === 'custom_shares' && (
                                        <div className="bg-white p-3 rounded-xl border border-indigo-100">
                                            <label className="block text-xs text-indigo-500 mb-1 font-bold">請輸入您想加碼的指定股數 (股)</label>
                                            <input type="number" value={customReinvestShares} onChange={(e) => setCustomReinvestShares(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all" placeholder="例如：403" />
                                        </div>
                                    )}

                                    {(reinvestSource !== 'custom_shares' && reinvestAvailableFunds <= 0) ? (
                                        <div className="text-center py-4 text-sm text-slate-400 border-2 border-dashed border-slate-100 rounded-xl">請選擇資金來源，或在上方新增賣出計畫</div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="flex flex-col sm:flex-row gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-400 mb-1">加碼買進價 (元)</label>
                                                    <input type="number" step="0.1" value={reinvestBuyPrice} onChange={(e) => setReinvestBuyPrice(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all" placeholder="輸入股價" />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-400 mb-1">新標的預期賣價 (元)</label>
                                                    <input type="number" step="0.1" value={reinvestTargetPrice} onChange={(e) => setReinvestTargetPrice(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all" placeholder="選填：試算終極全平倉獲利" />
                                                </div>
                                            </div>

                                            {/* 加碼結果顯示 */}
                                            {rMaxShares > 0 && (
                                                <div className="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 space-y-3 shadow-inner">
                                                    <div className="flex justify-between items-center text-sm border-b border-indigo-100 pb-2">
                                                        <span className="text-indigo-800">利用這筆資金買入:</span>
                                                        <span className="text-lg font-black text-indigo-600">{rMaxShares.toLocaleString()} <span className="text-xs font-normal">股</span></span>
                                                    </div>
                                                    <div className="flex justify-between text-xs text-slate-500">
                                                        <span>買進成本 (含手續費 {rBuyFee} 元)</span>
                                                        <span>{rCost.toLocaleString()} 元</span>
                                                    </div>
                                                    
                                                    {reinvestSource !== 'custom_shares' && (
                                                        <div className="flex justify-between text-xs text-slate-500">
                                                            <span>剩餘沒花完的現金</span>
                                                            <span>{rRemainingCash.toLocaleString()} 元</span>
                                                        </div>
                                                    )}
                                                    
                                                    {/* 新均價與全平倉結算 */}
                                                    {newTotalShares > 0 && (
                                                        <div className="mt-3 pt-3 border-t-2 border-dashed border-indigo-200 bg-white/60 p-3 rounded-lg">
                                                            <div className="text-sm text-indigo-700 mb-2 font-bold flex items-center gap-1">
                                                                <Target className="w-4 h-4" /> 加碼後新庫存狀態 (含未賣出股數)
                                                            </div>
                                                            <div className="flex justify-between items-center text-sm mb-1">
                                                                <span className="text-slate-600">最終持有總股數</span>
                                                                <span className="font-bold text-slate-800">{newTotalShares.toLocaleString()} 股</span>
                                                            </div>
                                                            <div className="flex justify-between items-center text-sm mb-1">
                                                                <span className="text-slate-600">總投入淨成本 (已扣除賣出所得)</span>
                                                                <span className="font-bold text-slate-800">{totalNetCost.toLocaleString()} 元</span>
                                                            </div>
                                                            <div className="flex justify-between items-center text-sm mt-2 pt-2 border-t border-slate-100">
                                                                <span className="text-slate-600">攤平後新均價 (損益平本點)</span>
                                                                <span className="text-xl font-black text-indigo-600">{newAvgPrice} 元</span>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {rTargetPriceNum > 0 && (
                                                        <div className="mt-3 pt-3 border-t border-indigo-100">
                                                            <div className="text-xs text-indigo-500 mb-1 font-bold">🌟 二階段全平倉總結 (賣出全部 {newTotalShares} 股)</div>
                                                            <div className="flex justify-between items-end">
                                                                <span className="text-sm text-slate-600">最終累積總淨利</span>
                                                                <span className={`text-2xl font-black ${finalNetProfit >= 0 ? 'text-red-500' : 'text-green-500'}`}>
                                                                    {finalNetProfit >= 0 ? '+' : ''}{Math.round(finalNetProfit).toLocaleString()}
                                                                </span>
                                                            </div>
                                                            <div className="text-right text-xs text-slate-400 mt-1">
                                                                總投入本金報酬率: {finalNetProfit >= 0 ? '+' : ''}{finalRoi}%
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Plan Library */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="bg-purple-50/50 p-4 border-b border-slate-100 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                <FileText className="w-5 h-5 text-purple-500" />
                                <h2 className="text-lg font-bold text-slate-700">我的交易計畫庫</h2>
                                </div>
                                <button onClick={saveCurrentPlan} className="text-sm font-medium flex items-center gap-1 text-purple-600 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 px-3 py-1.5 rounded-lg transition-colors">
                                <Save className="w-4 h-4" /> 儲存當前試算
                                </button>
                            </div>
                            <div className="p-4 space-y-4 bg-slate-50">
                                {savedPlans.length === 0 ? (
                                <div className="text-center py-8 text-slate-400 text-sm border-2 border-dashed border-slate-200 rounded-xl">尚未儲存任何計畫，點擊右上方按鈕儲存當前試算</div>
                                ) : (
                                savedPlans.map(plan => (
                                    <div key={plan.id} className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:border-purple-200 transition-colors">
                                    <div className="bg-slate-50 px-3 py-2 border-b border-slate-100 flex justify-between items-center">
                                        <span className="text-xs font-bold text-slate-500">🗓 {plan.date} 紀錄</span>
                                        <button onClick={() => deleteSavedPlan(plan.id)} className="text-slate-300 hover:text-red-500 p-1 rounded hover:bg-red-50 transition-colors" title="刪除計畫"><Trash2 className="w-4 h-4" /></button>
                                    </div>
                                    <textarea value={plan.content} onChange={(e) => updateSavedPlan(plan.id, e.target.value)} className="w-full h-40 p-3 bg-white outline-none resize-y text-sm text-slate-700 leading-relaxed focus:bg-purple-50/20 transition-colors" placeholder="請輸入您的筆記..." />
                                    </div>
                                ))
                                )}
                            </div>
                            </div>
                        </div>

                        {/* Right Column: Summary Dashboard */}
                        <div className="md:col-span-1 order-1 md:order-2">
                            <div className={`bg-white rounded-2xl shadow-sm border ${profitBorderColor} overflow-hidden sticky top-6`}>
                            <div className={`p-6 border-b ${profitBorderColor} ${profitBgColor} flex flex-col items-end`}>
                                <div className="flex items-center gap-2 text-slate-600 mb-2">
                                <h3 className="font-bold">{totalBuy.shares !== totalSell.shares ? '第一段已實現損益 (FIFO)' : '第一段總損益 (FIFO)'}</h3>
                                {isProfit ? <TrendingUp className="w-5 h-5 text-red-500" /> : <TrendingDown className="w-5 h-5 text-green-500" />}
                                </div>
                                <div className={`text-4xl font-black ${profitColor} text-right`}>
                                {isProfit ? '+' : ''}{Math.round(netProfit).toLocaleString()}
                                </div>
                                <div className="mt-2 text-sm font-medium text-slate-600 text-right">
                                報酬率: <span className={profitColor}>{isProfit ? '+' : ''}{roi}%</span>
                                </div>
                            </div>
                            
                            <div className="p-6 space-y-5">
                                <div className="space-y-4 pb-5 border-b border-slate-100">
                                <div className="flex items-center gap-2 text-sm font-bold text-slate-700 mb-2">
                                    <BarChart3 className="w-4 h-4 text-slate-400" />
                                    第一段資金比較
                                </div>
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs text-slate-500">
                                    <span>總買進成本</span>
                                    <span className="font-semibold text-slate-700">{totalBuy.cost.toLocaleString()}</span>
                                    </div>
                                    {unsoldShares > 0 && totalBuy.shares !== totalSell.shares && (
                                        <div className="flex justify-between text-xs text-orange-500">
                                            <span>↳ 留倉總成本 (均價 {(unsoldBuyCost / unsoldShares).toFixed(2)})</span>
                                            <span className="font-semibold">{Math.round(unsoldBuyCost).toLocaleString()}</span>
                                        </div>
                                    )}
                                    <div className="w-full bg-slate-100 rounded-full h-2.5 mt-1">
                                    <div className="bg-blue-400 h-2.5 rounded-full transition-all duration-700" style={{ width: costBarWidth }}></div>
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs text-slate-500">
                                    <span>總賣出實收</span>
                                    <span className="font-semibold text-slate-700">{totalSell.revenue.toLocaleString()}</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5">
                                    <div className={`h-2.5 rounded-full transition-all duration-700 ${isProfit ? 'bg-red-400' : 'bg-green-400'}`} style={{ width: revenueBarWidth }}></div>
                                    </div>
                                </div>
                                </div>
                                
                                <div className="pt-1 space-y-2">
                                <div className="flex justify-between text-xs text-slate-500">
                                    <span>總手續費 (買+賣)</span>
                                    <span>{(totalBuy.fee + totalSell.fee).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between text-xs text-slate-500">
                                    <span>總證交稅 (賣出)</span>
                                    <span>{totalSell.tax.toLocaleString()}</span>
                                </div>
                                
                                <div className="mt-4 pt-4 border-t border-slate-100">
                                    <div className="flex justify-between text-xs mb-1.5">
                                    <span className={`${totalBuy.shares !== totalSell.shares ? 'text-orange-500 font-bold' : 'text-slate-500'}`}>
                                        買進 {totalBuy.shares} 股 / 賣出 {totalSell.shares} 股
                                    </span>
                                    {totalBuy.shares !== totalSell.shares && <span className="text-orange-500 font-medium">庫存留倉 {unsoldShares.toLocaleString()} 股</span>}
                                    </div>
                                    {totalBuy.shares > 0 && (
                                    <div className="w-full bg-slate-100 rounded-full h-1.5 mt-2 overflow-hidden">
                                        <div className={`h-1.5 rounded-full transition-all duration-700 ${totalBuy.shares === totalSell.shares ? 'bg-slate-400' : 'bg-orange-400'}`} style={{ width: `${sellProgress}%` }}></div>
                                    </div>
                                    )}
                                </div>
                                </div>
                            </div>
                            </div>
                        </div>

                    </div>

                    {/* --- 目標停利試算表 --- */}
                    {unsoldShares > 0 && (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mt-6 mb-12">
                            <div className="bg-teal-50/50 p-4 border-b border-slate-100 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <Target className="w-5 h-5 text-teal-500" />
                                    <h2 className="text-lg font-bold text-slate-700 tracking-wide">庫存目標停利試算表 (5% ~ 8% 區間)</h2>
                                </div>
                                <div className="text-xs text-slate-500 hidden sm:block">
                                    以庫存均價 <span className="text-teal-600 font-bold">{(unsoldBuyCost / unsoldShares).toFixed(2)}</span> 元推算
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto hide-scrollbar">
                                <table className="w-full text-sm text-center whitespace-nowrap">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                            <th className="py-3 px-4 font-semibold tracking-wider">均價漲幅</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">賣出價格</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">預估損益</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">實際淨報酬</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">買入手續費</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">賣出手續費</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">證券交易稅</th>
                                            <th className="py-3 px-4 font-semibold tracking-wider">投資成本</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-slate-600">
                                        {generateProjectionTable().map((row, idx) => {
                                            const highlight = row.targetRaw >= 0.06 && row.targetRaw <= 0.07;
                                            return (
                                                <tr key={idx} className={`border-b border-slate-100 transition-colors ${highlight ? 'bg-amber-100 hover:bg-amber-200' : (idx % 2 === 0 ? 'bg-white hover:bg-slate-50' : 'bg-slate-50/30 hover:bg-slate-50')}`}>
                                                    <td className="py-3 px-4 font-bold text-slate-500">{row.targetLabel}</td>
                                                    <td className="py-3 px-4 font-bold text-slate-700">{row.sellPrice}</td>
                                                    <td className="py-3 px-4 font-bold text-red-500">
                                                        {row.profit > 0 ? '+' : ''}{Math.round(row.profit).toLocaleString()}
                                                    </td>
                                                    <td className="py-3 px-4 font-bold text-red-500">
                                                        {row.profit > 0 ? '+' : ''}{row.roi}%
                                                    </td>
                                                    <td className="py-3 px-4">{row.buyFee.toLocaleString()}</td>
                                                    <td className="py-3 px-4">{row.sellFee.toLocaleString()}</td>
                                                    <td className="py-3 px-4">{row.tax.toLocaleString()}</td>
                                                    <td className="py-3 px-4 text-slate-400">{Math.round(row.costIncludingAll).toLocaleString()}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            <div className="bg-slate-50 p-3 text-xs text-slate-400 text-center border-t border-slate-100 sm:hidden">左右滑動可查看完整表格資訊 ➔</div>
                        </div>
                    )}

                </div>
                </div>
            );
        }

        // ==========================================
        // 主元件：負責管理上方「多分頁」導覽列
        // ==========================================
        function App() {
            const [tabs, setTabs] = useState(() => {
                const saved = localStorage.getItem('twStockCalc_tabs_config');
                return saved ? JSON.parse(saved) : [{ id: 'default', name: '預設策略' }];
            });
            const [activeTabId, setActiveTabId] = useState(() => {
                const saved = localStorage.getItem('twStockCalc_active_tab');
                return saved ? saved : 'history'; // 預設打開歷史帳本
            });

            useEffect(() => {
                localStorage.setItem('twStockCalc_tabs_config', JSON.stringify(tabs));
                localStorage.setItem('twStockCalc_active_tab', activeTabId);
            }, [tabs, activeTabId]);

            const addTab = () => {
                const newId = 'tab_' + Date.now();
                const newName = `策略 ${tabs.length + 1}`;
                setTabs([...tabs, { id: newId, name: newName }]);
                setActiveTabId(newId);
            };

            const renameTab = (id, oldName) => {
                const newName = prompt('請輸入分頁名稱：', oldName);
                if (newName && newName.trim()) {
                    setTabs(tabs.map(t => t.id === id ? { ...t, name: newName.trim() } : t));
                }
            };

            const deleteTab = (id) => {
                if (tabs.length === 1) {
                    alert('除了歷史帳本，至少要保留一個試算分頁喔！');
                    return;
                }
                if (confirm('確定要刪除這個分頁嗎？(將清除該分頁所有紀錄)')) {
                    const newTabs = tabs.filter(t => t.id !== id);
                    setTabs(newTabs);
                    if (activeTabId === id) setActiveTabId('history');
                    
                    const keysToRemove = ['buyOrders', 'sellOrders', 'feeDiscount', 'minFee', 'brokerPreset', 'savedPlans', 'budgetAmount', 'budgetPrice', 'reinvestSource', 'customReinvestAmount', 'customReinvestShares', 'reinvestBuyPrice', 'reinvestTargetPrice'];
                    keysToRemove.forEach(k => localStorage.removeItem(`twStockCalc_${id}_${k}`));
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-10">
                    {/* 上方多分頁導覽列 */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 md:px-8 flex items-center overflow-x-auto hide-scrollbar">
                            
                            {/* 固定分頁：雲端同步教學 (移至最前方) */}
                            <div 
                                onClick={() => setActiveTabId('cloud-guide')}
                                className={`flex items-center gap-1.5 py-3 px-4 whitespace-nowrap cursor-pointer border-b-2 font-bold transition-colors ${activeTabId === 'cloud-guide' ? 'border-sky-500 text-sky-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                            >
                                <Cloud className="w-5 h-5" /> 同步教學
                            </div>

                            {/* 固定分頁：歷史總帳本 */}
                            <div 
                                onClick={() => setActiveTabId('history')}
                                className={`flex items-center gap-1.5 py-3 px-4 whitespace-nowrap cursor-pointer border-b-2 font-bold transition-colors ${activeTabId === 'history' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                            >
                                <Award className="w-5 h-5" /> 歷史總帳本
                            </div>

                            <div className="h-6 w-px bg-slate-200 mx-2"></div>

                            {/* 動態分頁：各個策略 */}
                            {tabs.map(tab => (
                                <div 
                                    key={tab.id}
                                    onClick={() => setActiveTabId(tab.id)}
                                    onDoubleClick={() => renameTab(tab.id, tab.name)}
                                    className={`flex items-center gap-2 py-3 px-4 whitespace-nowrap cursor-pointer border-b-2 font-medium transition-colors ${activeTabId === tab.id ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                                >
                                    {tab.name}
                                    {activeTabId === tab.id && tabs.length > 1 && (
                                        <button onClick={(e) => { e.stopPropagation(); deleteTab(tab.id); }} className="text-slate-300 hover:text-red-500 rounded-full p-0.5 ml-1 transition-colors" title="刪除分頁">
                                            <Trash2 className="w-4 h-4" />
                                        </button>
                                    )}
                                </div>
                            ))}
                            <button onClick={addTab} className="ml-2 flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 py-2 px-3 rounded-lg hover:bg-slate-100 transition-colors whitespace-nowrap">
                                <Plus className="w-4 h-4" /> 新增試算
                            </button>
                        </div>
                    </div>
                    
                    {/* 根據 activeTabId 渲染對應的元件 */}
                    {activeTabId === 'history' ? (
                        <HistoryLedger />
                    ) : activeTabId === 'cloud-guide' ? (
                        <CloudSyncGuide />
                    ) : (
                        <Calculator 
                            key={activeTabId} 
                            tabId={activeTabId} 
                            tabName={tabs.find(t=>t.id===activeTabId)?.name} 
                            onRename={() => renameTab(activeTabId, tabs.find(t=>t.id===activeTabId)?.name)} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
